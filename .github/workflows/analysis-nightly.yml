name: Analysis (nightly)

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  lock-pass:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with: { version: 10.33.0 }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: 22, cache: pnpm }

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run lock pass
        run: pnpm run analysis:lock

      - name: Open PR if balance-history changed
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7.0.8
        with:
          commit-message: "chore: nightly balance lock pass"
          title: "chore: nightly balance lock pass"
          branch: chore/nightly-lock
          body: |
            Auto-generated nightly balance pass.
            Review the diff in `sim/reports/turf/balance-history.json`.
            Generated by `.github/workflows/analysis-nightly.yml`.
