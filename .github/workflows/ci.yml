name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sim-purity grep gate
        run: |
          set -e
          # Only the purity test itself may reference these patterns
          # (in regex literals); every other sim file is scanned.
          PURITY_TEST='src/sim/__tests__/purity.test.ts'
          if grep -RInE 'Math\.random\s*\(' src/sim/ --include='*.ts' \
              | grep -v "^${PURITY_TEST}:"; then
            echo "::error::Math.random in src/sim/ — use createRng(seed). STANDARDS.md §2."
            exit 1
          fi
          if grep -RInE "from\s+['\"](react|react-dom|pixi-react|pixi\.js|@pixi/|tone|@capacitor/|framer-motion|@radix-ui/|matter-js)" src/sim/ --include='*.ts' \
              | grep -v "^${PURITY_TEST}:"; then
            echo "::error::Forbidden import in src/sim/. STANDARDS.md §2."
            exit 1
          fi

      - name: Type check
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test:node

      - name: DOM tests
        run: pnpm run test:dom

      - name: Build
        run: pnpm run build

  balance-benchmark:
    # Headless analysis benchmark on the CI profile (25 runs/mission).
    # Fails when any mission's median-governor clear rate < 40%.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run balance benchmark (CI profile)
        # Hard required gate: every mission must clear ≥40% under
        # median AND trash governors AND land within its parDuration
        # window. Calibrated 2026-04-28 against the v1.0 mission set.
        run: pnpm exec tsx scripts/analysis-cli.ts benchmark --profile ci

  release-gate:
    # Lock-state gate. Fails the PR if any v1 mission has drifted out
    # of STABLE (controlled by RELEASE_GATING=1).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release-gate test (STRICT)
        # PR-time strict gate: every v1 mission must lock as STABLE.
        env:
          RELEASE_GATING: '1'
        run: pnpm exec vitest run --config vitest.config.ts src/sim/analysis/__tests__/release-gate

  browser-canvas:
    # Real Chromium: render GameStage, verify the canvas drew something.
    # Catches Pixi-version / pixiGraphics-extend regressions that unit
    # tests can't see.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Browser test
        run: pnpm test:browser

  e2e-smoke:
    # Playwright e2e: launch a Vite preview, click through the
    # tutorial, assert the Cleared overlay appears.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm run build

      - name: e2e (desktop project)
        env:
          PW_HEADLESS: '1'
        run: pnpm exec playwright test --project=desktop

      - name: e2e (mobile-portrait — android launch smoke)
        env:
          PW_HEADLESS: '1'
        run: pnpm exec playwright test --project=mobile-portrait e2e/android-launch.spec.ts
